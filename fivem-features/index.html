function renderTabs(){
const nav=document.getElementById('tabNav');
const content=document.getElementById('content');
TABS.forEach((tab,ti)=>{
const btn=document.createElement('button');
btn.className='tab-btn'+(ti===0?' active':'');
btn.textContent=tab.icon+' '+tab.name;
btn.onclick=()=>{
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
document.getElementById('tab-'+ti).classList.add('active');
};
nav.appendChild(btn);
const tabDiv=document.createElement('div');
tabDiv.id='tab-'+ti;
tabDiv.className='tab-content'+(ti===0?' active':'');
let html='<div class="subtab-pills">';
tab.subtabs.forEach((st,si)=>{
html+=`<button class="subtab-pill${si===0?' active':''}" onclick="switchSubtab(${ti},${si})">${st.name}</button>`;
});
html+='</div>';
tab.subtabs.forEach((st,si)=>{
html+=`<div class="subtab-content${si===0?' active':''}" id="subtab-${ti}-${si}"><div class="columns">`;
st.groups.forEach(g=>{
html+=`<div class="group-card"><div class="group-title"><span class="group-icon" style="background:${g.icon}"></span>${g.name}</div>`;
g.features.forEach(f=>{
if(f.type==='info'){
html+=`<div class="feature-item${f.settings?' has-settings':''}" onclick="this.classList.toggle('open')"><div class="feature-name">${f.name}${f.badge?` <span class="badge badge-${f.badge}">${f.badge.toUpperCase()}</span>`:''}${f.settings?'<span class="arrow">▶</span>':''}</div>`;
if(f.settings){html+='<div class="feature-settings">';f.settings.forEach(s=>{let t=getTagClass(s);html+=`<div class="setting-row"><span class="setting-tag ${t}">${getTagLabel(s)}</span> ${s}</div>`;});html+='</div>';}
html+='</div>';
}else{
const hasS=f.settings&&f.settings.length;
html+=`<div class="feature-item${hasS?' has-settings':''}" onclick="this.classList.toggle('open')"><div class="feature-name"><span><span class="setting-tag tag-${f.type}">${f.type}</span> ${f.name}${f.badge?` <span class="badge badge-${f.badge}">${f.badge.toUpperCase()}</span>`:''}</span>${hasS?'<span class="arrow">▶</span>':''}</div>`;
if(hasS){html+='<div class="feature-settings">';f.settings.forEach(s=>{let t=getTagClass(s);html+=`<div class="setting-row"><span class="setting-tag ${t}">${getTagLabel(s)}</span> ${s}</div>`;});html+='</div>';}
html+='</div>';
}
});
html+='</div>';
});
html+='</div></div>';
});
tabDiv.innerHTML=html;
content.appendChild(tabDiv);
});
}
function switchSubtab(ti,si){
document.querySelectorAll(`#tab-${ti} .subtab-pill`).forEach((p,i)=>p.classList.toggle('active',i===si));
document.querySelectorAll(`#tab-${ti} .subtab-content`).forEach((c,i)=>c.classList.toggle('active',i===si));
}
function getTagClass(s){
const l=s.toLowerCase();
if(l.includes('toggle'))return'tag-toggle';if(l.includes('slider'))return'tag-slider';
if(l.includes('dropdown')||l.includes('type'))return'tag-dropdown';if(l.includes('color'))return'tag-color';
if(l.includes('button'))return'tag-button';if(l.includes('keybind'))return'tag-keybind';return'tag-toggle';
}
function getTagLabel(s){
const l=s.toLowerCase();
if(l.includes('toggle'))return'toggle';if(l.includes('slider'))return'slider';
if(l.includes('dropdown'))return'select';if(l.includes('color'))return'color';
if(l.includes('button'))return'action';if(l.includes('keybind'))return'key';return'option';
}
document.getElementById('search').addEventListener('input',function(){
const q=this.value.toLowerCase();
document.querySelectorAll('.feature-item').forEach(el=>{
const name=el.querySelector('.feature-name').textContent.toLowerCase();
el.style.display=(!q||name.includes(q))?'':'none';
});
document.querySelectorAll('.group-card').forEach(card=>{
const visible=card.querySelectorAll('.feature-item[style=""],.feature-item:not([style])');
card.style.display=visible.length?'':'none';
});
});
renderTabs();
</script>
